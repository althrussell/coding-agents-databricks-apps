command:
  - gunicorn
  - app:app
env:
  - name: HOME
    value: /app/python/source_code
  - name: ANTHROPIC_MODEL
    value: databricks-claude-opus-4-7
  - name: GEMINI_MODEL
    value: databricks-gemini-2-5-pro
  - name: CODEX_MODEL
    value: databricks-gpt-5-5
  - name: HERMES_MODEL
    value: databricks-claude-opus-4-6
  - name: HERMES_FALLBACK_MODEL
    value: databricks-claude-opus-4-6
  # Set ENABLE_HERMES=false to skip Hermes Agent install. Other CLIs are unaffected.
  - name: ENABLE_HERMES
    value: "true"
  - name: CLAUDE_CODE_DISABLE_AUTO_MEMORY
    value: 0
  - name: MAX_CONCURRENT_SESSIONS
    value: "5"
  # Override PAT_ROTATION_INTERVAL / PAT_TOKEN_LIFETIME here for e2e testing.
  # Defaults (10 min / 15 min) live in pat_rotator.py.
