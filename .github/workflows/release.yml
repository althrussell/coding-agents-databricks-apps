name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: databrickslabs-protected-runner-group
    permissions:
      contents: write
      # id-token: write is required for cosign keyless signing via GitHub OIDC.
      # Without it, cosign falls back to interactive auth and the workflow hangs.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version '$VERSION' in pyproject.toml is not valid semver"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Error: tag $TAG already exists — did you forget to bump the version in pyproject.toml?"
            exit 1
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            SINCE_MSG="(all commits — first release)"
          else
            RANGE="${PREV_TAG}..HEAD"
            SINCE_MSG="since $PREV_TAG"
          fi

          echo "Generating notes for $RANGE"

          # Categorize commits by conventional commit prefix
          FEATURES=$(git log $RANGE --pretty=format:"- %s (%h)" | grep -E "^- feat" | sed 's/^- feat[^:]*: /- /' || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" | grep -E "^- fix" | sed 's/^- fix[^:]*: /- /' || true)
          DOCS=$(git log $RANGE --pretty=format:"- %s (%h)" | grep -E "^- docs" | sed 's/^- docs[^:]*: /- /' || true)
          REFACTORS=$(git log $RANGE --pretty=format:"- %s (%h)" | grep -E "^- refactor" | sed 's/^- refactor[^:]*: /- /' || true)
          OTHER=$(git log $RANGE --pretty=format:"- %s (%h)" | grep -vE "^- (feat|fix|docs|refactor|chore|ci|test|style|perf|revert|Merge)" || true)

          {
            echo "NOTES<<EOF"
            echo "## What's Changed $SINCE_MSG"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$REFACTORS" ]; then
              echo "### Refactoring"
              echo "$REFACTORS"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/$TAG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      # ----- Supply-chain provenance: SBOM + cosign keyless signature ---------
      # Generates a CycloneDX SBOM from the repo (Python + npm package metadata),
      # then signs it with cosign using a short-lived OIDC token from GitHub.
      # Verifiers can confirm the SBOM came from this workflow at this tag via:
      #   cosign verify-blob --bundle coda-sbom.cdx.json.cosign.bundle \
      #     --certificate-identity-regexp 'https://github.com/databrickslabs/coding-agents-databricks-apps/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     coda-sbom.cdx.json
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@9f7302141466aa6482940f15371237e9d9f4c34a  # v0.20.5
        with:
          path: .
          format: cyclonedx-json
          output-file: coda-sbom.cdx.json
          # Don't auto-upload; we attach via softprops below for one consistent release.
          upload-artifact: false
          upload-release-assets: false

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6e07ee54d2049ce5cdfc7eed4d6a6ccd80f5b  # v3.5.0
        with:
          cosign-release: v2.4.1

      - name: Sign SBOM with cosign (keyless OIDC)
        run: |
          # --yes auto-confirms the Sigstore transparency log entry (Rekor).
          # The resulting bundle contains the signature + certificate + Rekor
          # inclusion proof in one self-contained file — easier for downstream
          # verifiers than separate .sig/.cert files.
          cosign sign-blob --yes \
            --bundle coda-sbom.cdx.json.cosign.bundle \
            coda-sbom.cdx.json
          # Sanity check: verify what we just signed before publishing.
          cosign verify-blob \
            --bundle coda-sbom.cdx.json.cosign.bundle \
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            coda-sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          tag_name: "${{ steps.version.outputs.TAG }}"
          name: "${{ steps.version.outputs.TAG }}"
          body: ${{ steps.notes.outputs.NOTES }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            coda-sbom.cdx.json
            coda-sbom.cdx.json.cosign.bundle
